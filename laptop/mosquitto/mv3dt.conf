# laptop/mosquitto/mv3dt.conf
#
# Mosquitto drop-in for the DS 9.0 laptop scripted testing harness.
# Seeded from Notion page 337b5d58-7212-81e1-b07a-d510d9605bbb §6.2.
#
# Installed by laptop/scripts/10_setup_mosquitto.sh into
#   /etc/mosquitto/conf.d/mv3dt.conf
# and then the service is restarted.
#
# Posture: "simple testing" — anonymous access on 1883 (MQTT) and 9001
# (websockets) on all interfaces. This is intentional for the laptop-side
# testing harness so mosquitto_sub/pub, the DS 9.0 nvmsgbroker sink, and a
# local browser-based MQTT inspector all work out of the box.
#
# For the hardened production variant (localhost-only listener, password
# file, ACL file) see laptop/docs/DEEPSTREAM-SETUP.md, "Mosquitto —
# production hardening" (self-contained; this laptop tree does not read
# from my-docs/). 10_setup_mosquitto.sh also accepts a `--with-firewall`
# flag which opens 1883/9001 via ufw for operators who have ufw enabled.

# MQTT over TCP (DS 9.0 nvmsgbroker -> libnvds_mqtt_proto.so publishes here)
listener 1883 0.0.0.0

# Websockets (for browser-based MV3DT inspectors)
listener 9001
protocol websockets

allow_anonymous true

# Reasonable defaults so a slow consumer cannot OOM the broker during tests.
max_inflight_messages 100
max_queued_messages 1000
max_packet_size 268435456

persistence false
# log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
