<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: bold; fill: #1a1a1a; }
      .box { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #333; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 9px; fill: #555; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #2c5282; }
    </style>
  </defs>
  <rect width="760" height="560" fill="#fafafa" stroke="#ccc" stroke-width="2" rx="6"/>
  <text x="380" y="28" text-anchor="middle" class="title">Interim Development Configuration</text>

  <!-- Jetsons -->
  <rect x="60" y="52" width="100" height="44" rx="4" fill="#4a90d9" stroke="#2d6cb5" stroke-width="1.5"/>
  <text x="110" y="72" text-anchor="middle" class="box" fill="#fff" font-weight="bold">Jetson 1</text>
  <text x="110" y="86" text-anchor="middle" class="small" fill="#e8f0ff">(Standby)</text>

  <rect x="330" y="52" width="100" height="44" rx="4" fill="#4a90d9" stroke="#2d6cb5" stroke-width="1.5"/>
  <text x="380" y="72" text-anchor="middle" class="box" fill="#fff" font-weight="bold">Jetson 2</text>
  <text x="380" y="86" text-anchor="middle" class="small" fill="#e8f0ff">(Standby)</text>

  <rect x="600" y="52" width="100" height="44" rx="4" fill="#4a90d9" stroke="#2d6cb5" stroke-width="1.5"/>
  <text x="650" y="72" text-anchor="middle" class="box" fill="#fff" font-weight="bold">Jetson 3</text>
  <text x="650" y="86" text-anchor="middle" class="small" fill="#e8f0ff">(Standby)</text>

  <line x1="110" y1="96" x2="380" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="380" y1="96" x2="380" y2="130" stroke="#666" stroke-width="1.5"/>
  <line x1="650" y1="96" x2="380" y2="130" stroke="#666" stroke-width="1.5"/>

  <!-- Switch 1 -->
  <rect x="310" y="130" width="140" height="48" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="380" y="152" text-anchor="middle" class="box" fill="#fff" font-weight="bold">Switch 1</text>
  <text x="380" y="168" text-anchor="middle" class="small" fill="#eafaf1">(Main LAN)</text>

  <line x1="380" y1="178" x2="380" y2="208" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Dev Laptop -->
  <rect x="275" y="208" width="210" height="88" rx="5" fill="#8e44ad" stroke="#6c3483" stroke-width="1.5"/>
  <text x="380" y="232" text-anchor="middle" class="box" fill="#fff" font-weight="bold">Dev Laptop</text>
  <text x="380" y="248" text-anchor="middle" class="small" fill="#f5e6ff">RTX 3060+ Ę Ubuntu 24.04</text>
  <text x="380" y="266" text-anchor="middle" class="small" fill="#f5e6ff">DeepStream 8.0 + MV3DT Ę MQTT Broker</text>
  <text x="380" y="282" text-anchor="middle" class="small" fill="#f5e6ff">All 8 camera streams</text>

  <text x="500" y="248" class="note" font-style="italic">É workload</text>

  <line x1="380" y1="296" x2="380" y2="326" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Switch 2 -->
  <rect x="310" y="326" width="140" height="48" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="380" y="348" text-anchor="middle" class="box" fill="#fff" font-weight="bold">Switch 2</text>
  <text x="380" y="364" text-anchor="middle" class="small" fill="#eafaf1">(Distribution)</text>

  <line x1="330" y1="374" x2="180" y2="420" stroke="#d68910" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="430" y1="374" x2="580" y2="420" stroke="#d68910" stroke-width="2" marker-end="url(#arr)"/>

  <!-- PoE A / B -->
  <rect x="90" y="420" width="180" height="52" rx="4" fill="#f39c12" stroke="#c87f0a" stroke-width="1.5"/>
  <text x="180" y="442" text-anchor="middle" class="box" fill="#fff" font-weight="bold">PoE Switch A</text>
  <text x="180" y="460" text-anchor="middle" class="small" fill="#fff8e6">Cameras 14</text>

  <rect x="490" y="420" width="180" height="52" rx="4" fill="#f39c12" stroke="#c87f0a" stroke-width="1.5"/>
  <text x="580" y="442" text-anchor="middle" class="box" fill="#fff" font-weight="bold">PoE Switch B</text>
  <text x="580" y="460" text-anchor="middle" class="small" fill="#fff8e6">Cameras 58</text>

  <text x="380" y="510" text-anchor="middle" class="small">Jetsons on standby until JetPack 7.x + DeepStream 8.0 on Orin Nano</text>
</svg>
