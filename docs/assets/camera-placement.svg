<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <style>
      .floor { fill: #f5f5f5; stroke: #333; stroke-width: 3; }
      .camera { fill: #e74c3c; }
      .camera-fov { fill: rgba(231, 76, 60, 0.15); stroke: #e74c3c; stroke-width: 1; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .entry-label { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #27ae60; font-weight: bold; }
      .coord-label { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #666; }
      .doorway { stroke: #27ae60; stroke-width: 4; }
      .legend-text { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #333; }
    </style>
  </defs>
  
  <!-- Floor outline (non-rectangular with alcove on left side) -->
  <path class="floor" d="
    M 50 50 
    L 550 50 
    L 550 450 
    L 50 450 
    L 50 320
    L 100 320
    L 100 220
    L 50 220
    L 50 50
    Z
  "/>
  
  <!-- Entry doorway (right side, between C8 and top-right corner) -->
  <line class="doorway" x1="550" y1="50" x2="550" y2="100"/>
  <text x="560" y="80" class="entry-label" transform="rotate(90, 560, 80)">Entry</text>
  
  <!-- Left side doorway (in alcove area) -->
  <line class="doorway" x1="50" y1="320" x2="50" y2="370"/>
  
  <!-- Coordinate origin marker (bottom-right) -->
  <circle cx="550" cy="450" r="8" fill="#3498db"/>
  <text x="555" y="470" class="coord-label">(0,0)</text>
  
  <!-- Camera C1 - bottom right, facing up-left (northwest) -->
  <polygon class="camera-fov" points="500,420 420,340 480,300 540,360"/>
  <circle cx="520" cy="430" r="10" class="camera"/>
  <text x="530" y="445" class="label">C1</text>
  
  <!-- Camera C2 - bottom center, facing up (north) -->
  <polygon class="camera-fov" points="300,430 240,320 360,320"/>
  <circle cx="300" cy="430" r="10" class="camera"/>
  <text x="310" y="445" class="label">C2</text>
  
  <!-- Camera C3 - bottom left, facing up-right (northeast) -->
  <polygon class="camera-fov" points="150,420 170,300 260,360 200,420"/>
  <circle cx="160" cy="430" r="10" class="camera"/>
  <text x="130" y="445" class="label">C3</text>
  
  <!-- Camera C4 - left alcove, facing right/east into room -->
  <polygon class="camera-fov" points="100,270 200,220 200,320"/>
  <circle cx="75" cy="270" r="10" class="camera"/>
  <text x="55" y="260" class="label">C4</text>
  
  <!-- Camera C5 - top left corner, facing SOUTHWEST (down-left diagonal) -->
  <polygon class="camera-fov" points="130,80 80,180 180,180"/>
  <circle cx="150" cy="65" r="10" class="camera"/>
  <text x="160" y="60" class="label">C5</text>
  
  <!-- Camera C6 - top center-left, facing down (south) -->
  <polygon class="camera-fov" points="280,65 220,180 340,180"/>
  <circle cx="280" cy="65" r="10" class="camera"/>
  <text x="290" y="60" class="label">C6</text>
  
  <!-- Camera C7 - top center-right, facing down (south) -->
  <polygon class="camera-fov" points="400,65 340,180 460,180"/>
  <circle cx="400" cy="65" r="10" class="camera"/>
  <text x="410" y="60" class="label">C7</text>
  
  <!-- Camera C8 - top right, facing down-left (southwest), Entry is to its RIGHT -->
  <polygon class="camera-fov" points="500,80 440,180 520,200"/>
  <circle cx="510" cy="65" r="10" class="camera"/>
  <text x="480" y="60" class="label">C8</text>
  
  <!-- Axis indicators at origin -->
  <line x1="550" y1="450" x2="550" y2="420" stroke="#3498db" stroke-width="2"/>
  <text x="555" y="415" class="coord-label">-Y</text>
  <line x1="550" y1="450" x2="520" y2="450" stroke="#3498db" stroke-width="2"/>
  <text x="500" y="455" class="coord-label">-X</text>
  
  <!-- Legend -->
  <rect x="60" y="460" width="220" height="35" fill="white" stroke="#ccc" rx="3"/>
  <circle cx="80" cy="477" r="6" fill="#e74c3c"/>
  <text x="92" y="482" class="legend-text">Camera position</text>
  <line x1="160" y1="477" x2="180" y2="477" stroke="#27ae60" stroke-width="3"/>
  <text x="185" y="482" class="legend-text">Doorway</text>
  <circle cx="250" cy="477" r="5" fill="#3498db"/>
  <text x="258" y="482" class="legend-text">Origin</text>
</svg>
